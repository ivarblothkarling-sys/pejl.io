# Kompletterar (går INTE i konflikt med) den wrangler-konfig som Nitro
# genererar vid build (.output/server/wrangler.json). Nitro slår ihop denna
# fil med sina egna beräknade värden och force-overridar alltid `name`,
# `main`, `assets` och `compatibility_date` — sätt därför INGET av det här,
# bara det som är specifikt för det här projektet (cron-triggers m.m.).
# Se node_modules/nitro/dist/_presets.mjs (writeWranglerConfig/readWranglerConfig)
# för exakt merge-logik.

[triggers]
# Cloudflare Cron Triggers körs alltid i UTC och följer INTE sommartid —
# under CEST (sommartid, UTC+2) blir tiderna nedan 1h senare lokalt än
# kommentaren anger. Justera manuellt två gånger om året om exakt lokal tid
# året runt är ett hårt krav. Dispatchas i plugins/cloudflare-scheduled.ts,
# som avgör vilket jobb som ska köras via controller.cron.
crons = [
  "0 5 * * *", # 05:00 UTC = 06:00 CET (vintertid) — daglig Fortnox-synk, varje dag.
  "0 6 * * 1", # 06:00 UTC = 07:00 CET (vintertid) — veckobrev, måndagar.
]
